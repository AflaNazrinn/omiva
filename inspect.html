<!DOCTYPE html>
<html>
<head>
    <title>Inspect Images</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #222; padding: 10px; border-radius: 8px; }
        img { max-width: 100%; height: auto; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>Omiva Motors Images</h1>
    <div class="grid">
        <div class="card">
            <h3>BOTTOM.png</h3>
            <img src="images/BOTTOM.png">
        </div>
        <div class="card">
            <h3>Right side.png</h3>
            <img src="images/Right side.png">
        </div>
        <div class="card">
            <h3>Front Panel.png</h3>
            <img src="images/Front Panel.png">
        </div>
        <div class="card">
            <h3>3D.png</h3>
            <img src="images/3D.png">
        </div>
        <div class="card">
            <h3>Left side .png</h3>
            <img src="images/Left side .png">
        </div>
        <div class="card">
            <h3>Back Pnel.png</h3>
            <img src="images/Back Pnel.png">
        </div>
    </div>
</body>
</html>
